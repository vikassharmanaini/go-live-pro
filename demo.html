<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Live Server Demo</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
        }
        p {
            color: #94a3b8;
        }
        .status {
            margin-top: 2rem;
            padding: 0.5rem 1rem;
            background: #22c55e;
            color: white;
            border-radius: 2rem;
            font-size: 0.875rem;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Live Server Active!</h1>
        <p>Try changing this text in the editor and save to see the magic.</p>
        <div class="status">Connected via WebSocket</div>
    </div>
</body>
</html>
